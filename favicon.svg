<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#f0e8d1"/>
  <!-- Diamond shape -->
  <polygon points="50,4 96,50 50,96 4,50" fill="rgba(255,8,0,0.06)" stroke="#ff0800" stroke-width="2.2"/>
  <!-- Cardinal point dots -->
  <circle cx="50" cy="4"  r="2.2" fill="#ff0800"/>
  <circle cx="96" cy="50" r="2.2" fill="#ff0800"/>
  <circle cx="50" cy="96" r="2.2" fill="#ff0800"/>
  <circle cx="4"  cy="50" r="2.2" fill="#ff0800"/>
  <!-- Inner circle (subtle) -->
  <circle cx="50" cy="50" r="30" fill="none" stroke="#ff0800" stroke-width="1" opacity="0.35"/>
  <!-- F — large, bold, centered -->
  <text x="50" y="70" font-family="Georgia,serif" font-size="62" font-weight="700" fill="#ff0800" text-anchor="middle">F</text>
</svg>
