<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VSL Editor — First try</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f6ede0;--bg2:#f0e8d1;--bg3:#e8dcc4;
  --text:#1C1A17;--text2:#6B6457;
  --accent:#ff0800;--border:rgba(28,26,23,0.12);
  --del:#ff0800;--del-bg:rgba(255,8,0,0.12);
  --keep:#2a7a4b;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
body{display:flex;flex-direction:column;overflow:hidden;}

/* TOPBAR */
.topbar{flex-shrink:0;background:var(--bg);border-bottom:.5px solid var(--border);padding:0 16px;height:48px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.topbar-left{display:flex;align-items:center;gap:12px;}
.logo{font-family:Georgia,serif;font-size:14px;font-weight:700;color:var(--accent);}
.file-chip{font-size:11px;color:var(--text2);background:var(--bg2);border:.5px solid var(--border);border-radius:20px;padding:3px 10px;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.stat{font-size:11px;color:var(--text2);white-space:nowrap;}
.stat strong{color:var(--accent);}

/* TOOLBAR */
.toolbar{flex-shrink:0;background:var(--bg2);border-bottom:.5px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.btn{font-size:11px;font-weight:600;font-family:inherit;padding:6px 14px;border-radius:6px;border:.5px solid var(--border);cursor:pointer;transition:background .15s;}
.btn-ghost{background:var(--bg);color:var(--text2);}
.btn-ghost:hover{background:var(--bg3);color:var(--text);}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-primary:hover{opacity:.85;}
.btn-danger{background:rgba(255,8,0,.08);color:var(--accent);border-color:rgba(255,8,0,.2);}
.btn-danger:hover{background:rgba(255,8,0,.15);}
.sep{width:.5px;height:20px;background:var(--border);}
.toolbar-hint{font-size:10px;color:var(--text2);margin-left:auto;}

/* TRANSCRIPT */
.transcript-wrap{flex:1;overflow-y:auto;padding:24px 16px 80px;max-width:860px;margin:0 auto;width:100%;}
.words{line-height:2.4;font-size:15px;user-select:none;-webkit-user-select:none;}
.word{
  display:inline;
  padding:2px 0;
  border-radius:3px;
  cursor:pointer;
  transition:background .1s,color .1s;
  white-space:pre-wrap;
}
.word:hover{background:rgba(255,8,0,.08);}
.word.deleted{
  background:var(--del-bg);
  color:var(--del);
  text-decoration:line-through;
  text-decoration-color:rgba(255,8,0,.5);
}
.pause-marker{
  display:inline-block;
  width:2px;height:14px;
  background:var(--border);
  border-radius:1px;
  margin:0 6px;
  vertical-align:middle;
  opacity:.4;
}
.ts-badge{
  font-size:9px;letter-spacing:.08em;
  color:var(--text2);opacity:.5;
  font-variant-numeric:tabular-nums;
  margin:0 4px;
  pointer-events:none;
  user-select:none;
}

/* EXPORT DRAWER */
.export-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--bg);border-top:.5px solid var(--border);
  padding:12px 16px;
  display:flex;align-items:center;gap:12px;
  transform:translateY(100%);
  transition:transform .2s;
}
.export-bar.visible{transform:translateY(0);}
.export-info{font-size:11px;color:var(--text2);flex:1;}
.export-info strong{color:var(--text);}

/* SELECTION mode */
body.selecting .word{cursor:crosshair;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <span class="logo">FTR</span>
    <span class="file-chip">First try VSL.mov — 12:14</span>
  </div>
  <div class="topbar-right">
    <span class="stat">Deleted: <strong id="del-count">0</strong> words</span>
    <span class="stat">/ <strong id="del-time">0s</strong></span>
  </div>
</div>

<div class="toolbar">
  <button class="btn btn-ghost" onclick="selectMode()">Select range</button>
  <button class="btn btn-ghost" onclick="clearAll()">Clear all</button>
  <div class="sep"></div>
  <button class="btn btn-ghost" onclick="deleteFromTo(0, 17.34)">Delete intro silence</button>
  <button class="btn btn-ghost" onclick="deletePhrase('Hi guys')">Delete "Hi guys"</button>
  <div class="sep"></div>
  <button class="btn btn-primary" onclick="exportCuts()">Export cuts.json</button>
  <span class="toolbar-hint">Tap words to mark for deletion &nbsp;·&nbsp; Tap again to restore</span>
</div>

<div class="transcript-wrap">
  <div class="words" id="words-container"></div>
</div>

<div class="export-bar" id="export-bar">

  </div>
  <button class="btn btn-primary" onclick="downloadCuts()">Download cuts.json</button>
  <button class="btn btn-ghost" onclick="hideExport()">Luk</button>
</div>

    container.appendChild(span);
    
    prevEnd = w.e;
  });
  updateStats();
}

function toggleWord(i) {
  if (deleted.has(i)) deleted.delete(i);
  else deleted.add(i);
  const span = document.querySelector('.word[data-i="'+i+'"]');
  if (span) span.className = 'word' + (deleted.has(i) ? ' deleted' : '');
  updateStats();
}

let dragActive = false;
let dragMode = null; // 'add' or 'remove'
function startDrag(e, i) {
  if (e.button !== 0) return;
  dragActive = true;
  dragMode = deleted.has(i) ? 'remove' : 'add';
  document.addEventListener('mouseup', stopDrag, {once:true});
}
function continueDrag(e, i) {
  if (!dragActive) return;
  if (dragMode === 'add') deleted.add(i);
  else deleted.delete(i);
  const span = document.querySelector('.word[data-i="'+i+'"]');
  if (span) span.className = 'word' + (deleted.has(i) ? ' deleted' : '');
  updateStats();
}
function stopDrag() { dragActive = false; }

function deleteFromTo(startSec, endSec) {
  WORDS.forEach((w, i) => {
    if (w.s >= startSec && w.e <= endSec) deleted.add(i);
  });
  render();
}

function deletePhrase(phrase) {
  const lp = phrase.toLowerCase();
  WORDS.forEach((w, i) => {
    if (w.w.toLowerCase().includes(lp.split(' ')[0])) {
      // Mark a few words around it
      for (let j = i; j < Math.min(i + phrase.split(' ').length + 1, WORDS.length); j++) {
        deleted.add(j);
      }
    }
  });
  render();
}

function clearAll() {
  deleted.clear();
  render();
}

function updateStats() {
  let count = deleted.size;
  let secs = 0;
  deleted.forEach(i => { secs += WORDS[i].e - WORDS[i].s; });
  document.getElementById('del-count').textContent = count;
  document.getElementById('del-time').textContent = Math.round(secs) + 's';
}

function buildCuts() {
  // Convert deleted words to time ranges (merge adjacent)
  const sorted = [...deleted].sort((a,b) => a-b);
  const ranges = [];
  let i = 0;
  while (i < sorted.length) {
    let start = WORDS[sorted[i]].s;
    let end = WORDS[sorted[i]].e;
    while (i+1 < sorted.length && sorted[i+1] === sorted[i]+1) {
      i++;
      end = WORDS[sorted[i]].e;
    }
    ranges.push([Math.max(0, start - 0.05), end + 0.05]);
    i++;
  }
  return ranges;
}

function exportCuts() {
  const cuts = buildCuts();
  let secs = 0;
  deleted.forEach(i => { secs += WORDS[i].e - WORDS[i].s; });
  const summary = cuts.length + ' cut' + (cuts.length !== 1 ? 's' : '') + ', ~' + Math.round(secs) + 's removed';
  document.getElementById('exp-summary').textContent = summary;
  document.getElementById('export-bar').classList.add('visible');
}

function downloadCuts() {
  const cuts = buildCuts();
  const data = {
    source: 'First try VSL.mov',
    generated: new Date().toISOString(),
    cuts: cuts,
    total_removed_seconds: [...deleted].reduce((a, i) => a + WORDS[i].e - WORDS[i].s, 0)
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'vsl_cuts.json';
  a.click();
}

function hideExport() {
  document.getElementById('export-bar').classList.remove('visible');
}

function formatTime(s) {
  const m = Math.floor(s/60);
  const ss = Math.floor(s%60);
  return m + ':' + String(ss).padStart(2,'0');
}

function selectMode() {
  document.body.classList.toggle('selecting');
}

// Touch support
document.addEventListener('DOMContentLoaded', () => {
  render();
  
  // Touch drag
  let touchStartI = null;
  let touchDragMode = null;
  document.getElementById('words-container').addEventListener('touchstart', e => {
    const el = e.target.closest('.word');
    if (!el) return;
    const i = parseInt(el.dataset.i);
    touchStartI = i;
    touchDragMode = deleted.has(i) ? 'remove' : 'add';
  }, {passive:true});
  
  document.getElementById('words-container').addEventListener('touchmove', e => {
    const touch = e.touches[0];
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    if (!el || !el.classList.contains('word')) return;
    const i = parseInt(el.dataset.i);
    if (touchDragMode === 'add') deleted.add(i);
    else deleted.delete(i);
    el.className = 'word' + (deleted.has(i) ? ' deleted' : '');
    updateStats();
  }, {passive:true});
});
</script>

</body>
</html>
